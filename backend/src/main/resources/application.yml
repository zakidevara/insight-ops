server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true

logging:
  level:
    org.springframework.ai.mcp: DEBUG
    io.modelcontextprotocol: DEBUG

llm:
  default-provider: OLLAMA

spring:
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: sre-analysis
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.insightops.event"
  datasource:
    url: jdbc:postgresql://localhost:5432/insightops
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768        # nomic-embed-text produces 768-dim vectors
        distance-type: COSINE_DISTANCE
    openai:
      # Google's OpenAI-compatible endpoint — uses GEMINI_API_KEY for auth
      api-key: ${GEMINI_API_KEY:placeholder}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        options:
          model: gemini-2.5-flash
      embedding:
        enabled: false   # embeddings stay with Ollama (nomic-embed-text)
    mcp:
      client:
        # Set to true and uncomment clients below to enable Phase 2 MCP tools.
        # Requires Node.js / npx installed on the host.
        enabled: false   # client bean created manually in McpConfig.java
        #   prometheus:
        #     transport:
        #       type: stdio
        #       command: "npx"
        #       args: ["-y", "@modelcontextprotocol/server-prometheus"]
        #       env:
        #         PROMETHEUS_URL: "http://localhost:9090"
        #   kubernetes:
        #     transport:
        #       type: stdio
        #       command: "npx"
        #       args: ["-y", "@modelcontextprotocol/server-kubernetes"]
